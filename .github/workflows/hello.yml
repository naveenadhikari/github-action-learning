name: Hello World Workflow

on:
  push:
    branches:
      - main
      
  pull_request:
    branches:
      - newbranch

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Say hello
        run: echo "Hello from GitHub Actions!"

      - name: Show the date
        run: date

  job2:
    runs-on: ubuntu-latest
    needs: greet

    steps:
      - name: Print Date
        run:  date


  job3:
    runs-on: ubuntu-latest
    needs: job2

    steps:
      - name: print host
        run: whoami
